spring.application.name=surdocs-external-backend

server.servlet.context-path=/surdocs-external
server.port=8080

# SQL Server JDBC configuration
spring.datasource.url=jdbc:sqlserver://YOUR_SQLSERVER_HOST:1433;databaseName=YOUR_DATABASE;encrypt=false
spring.datasource.username=YOUR_SQLSERVER_USERNAME
spring.datasource.password=YOUR_SQLSERVER_PASSWORD
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.hikari.pool-name=SurdocsHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# FileNet WSI configuration placeholders
filenet.uri=http://YOUR_FILENET_CE_URI/wsi/FNCEWS40MTOM/
filenet.username=YOUR_FILENET_USERNAME
filenet.password=YOUR_FILENET_PASSWORD
filenet.object-store-name=YOUR_OBJECT_STORE_NAME
filenet.stanza=FileNetP8WSI
filenet.connection-cache-enabled=true

# Viewer configuration
surdocs.viewer.protocol=https://
surdocs.viewer.host=YOUR_NAVIGATOR_HOST
surdocs.viewer.port=443
surdocs.viewer.desktop=YOUR_NAVIGATOR_DESKTOP

# Google reCAPTCHA configuration
google.recaptcha.verify-url=https://www.google.com/recaptcha/api/siteverify
google.recaptcha.secret=YOUR_RECAPTCHA_SECRET

# WebSphere-friendly settings
spring.main.banner-mode=off
spring.jmx.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.root=INFO
logging.level.gov.dc.surdocs=INFO
