spring.application.name=surdocs-external-backend

server.servlet.context-path=/surdocs-external
server.port=8080

# SQL Server JDBC configuration
spring.datasource.url=jdbc:sqlserver://DOB-FNSQLTST01.dcra.dcgov.priv:1433;databaseName=FNDOBDB;encrypt=false
spring.datasource.username=dbuser
spring.datasource.password=DOBFileNetP8
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.hikari.pool-name=SurdocsHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# FileNet WSI configuration placeholders
filenet.uri=http://DOB-FNCPETEST01.dcra.dcgov.priv:9080/wsi/FNCEWS40MTOM/
filenet.username=fngcdadmin
filenet.password=DCRAFileNetP8
filenet.object-store-name=DOB
filenet.stanza=FileNetP8WSI
filenet.connection-cache-enabled=true

# Viewer configuration
surdocs.viewer.protocol=https://
surdocs.viewer.host=dob-fnwebtest01.dcra.dcgov.priv
surdocs.viewer.port=443
#surdocs.viewer.port=9080
surdocs.viewer.desktop=SurDocsGUIPublic

# Google reCAPTCHA configuration
google.recaptcha.verify-url=https://www.google.com/recaptcha/api/siteverify
google.recaptcha.secret=YOUR_RECAPTCHA_SECRET

# WebSphere-friendly settings
spring.main.banner-mode=off
spring.jmx.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.root=INFO
logging.level.gov.dc.surdocs=INFO
